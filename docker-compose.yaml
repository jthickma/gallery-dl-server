name: gallery-dl-server

services:
  gallery-dl:
    build:
      context: .
      dockerfile: Dockerfile
    image: gallery-dl-server:local
    container_name: gallery-dl-server-local
    ports:
      - "9080:9080"
    environment:
      CONTAINER_PORT: "9080"
      UID: "1000"
      GID: "1000"
      UMASK: "022"
      TZ: "UTC"
    volumes:
      # Keep config as a host bind mount so edits apply immediately.
      - type: bind
        source: /home/jackson/.config/gallery-dl  
        target: /config
      # Preferred output path used by default gallery-dl-server config.
      - type: bind
        source: ./docker/downloads
        target: /gallery-dl
      # Compatibility path for configs using "base-directory": "~/Media/gallery-dl".
      - type: bind
        source: ./docker/downloads
        target: /usr/src/app/Media/gallery-dl
    restart: unless-stopped
