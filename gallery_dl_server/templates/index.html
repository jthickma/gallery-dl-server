<!DOCTYPE html>
<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Web frontend for gallery-dl with yt-dlp" />

    <title>gallery-dl-server</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kristi&display=swap"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.1/dist/sweetalert2.min.css"
      integrity="sha384-0rAIx50lGVKKgD0hHiZxK1Qr9rwyluE7lb/4He9HuRAzfaemTbDsikKlQmxu0T8e"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="/static/styles/common.css?v=0.3.0" />
    <link rel="stylesheet" href="/static/styles/index.css?v=0.3.0" />

    <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon" />
    <link rel="manifest" href="/static/icons/site.webmanifest" />

    <script
      src="https://cdn.jsdelivr.net/npm/sweetalert2@11.12.1/dist/sweetalert2.min.js"
      integrity="sha384-+KH6r+BQCUofyrPWto++vkathMCGgcUomPfaNOyHmsw/PUw5LXIrZV8/XuRnVHc/"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="preload">
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="/gallery-dl">
          <span class="brand-mark">dl</span>
          <span class="brand-name">gallery-dl-server</span>
        </a>

        <nav class="app-nav">
          <a class="nav-link active" href="#">Files</a>
          <a class="nav-link" href="/gallery-dl/logs">Logs</a>
        </nav>

        <div class="app-header-right">
          <button id="theme-toggle" class="icon-btn" type="button" title="Toggle theme" aria-label="Toggle theme">
            <i class="bi bi-moon-fill"></i>
          </button>
          <a
            class="version-link"
            href="https://github.com/jthickma/gallery-dl-server"
            target="_blank"
            rel="noopener noreferrer"
            title="gallery-dl-server on GitHub"
            >v{{ app_version }}</a
          >
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="submit-bar">
        <form id="form" class="submit-form" autocomplete="off">
          <div class="input-field">
            <i class="bi bi-link-45deg input-icon"></i>
            <input
              name="url"
              type="url"
              placeholder="Paste a gallery-dl or yt-dlp URL..."
              title="Enter URL"
              aria-label="URL"
              autofocus
            />
          </div>

          <select class="input-select" name="video-opts" title="Download options">
            <option value="none-selected">Auto</option>
            <option value="download-video">Video</option>
            <option value="extract-audio">Audio only</option>
          </select>

          <button id="button-submit" class="btn-primary" type="submit">
            <i class="bi bi-cloud-download"></i>
            <span>Download</span>
          </button>
        </form>
      </section>

      <section id="downloads-browser" class="downloads-panel">
        <div class="panel-header">
          <div class="panel-title">
            <i class="bi bi-folder2-open"></i>
            <h2>Files</h2>
            <span id="downloads-root" class="panel-subtitle"></span>
          </div>

          <div class="panel-actions">
            <div class="segmented" role="tablist" aria-label="View mode">
              <button id="view-grid" class="segmented-btn active" type="button" title="Grid view" aria-label="Grid view">
                <i class="bi bi-grid-3x3-gap-fill"></i>
              </button>
              <button id="view-list" class="segmented-btn" type="button" title="List view" aria-label="List view">
                <i class="bi bi-list-ul"></i>
              </button>
            </div>

            <select id="sort-select" class="input-select compact" title="Sort">
              <option value="name-asc">Name A-Z</option>
              <option value="name-desc">Name Z-A</option>
              <option value="modified-desc">Newest</option>
              <option value="modified-asc">Oldest</option>
              <option value="size-desc">Largest</option>
              <option value="size-asc">Smallest</option>
            </select>

            <button id="refresh-downloads" class="icon-btn" type="button" title="Refresh" aria-label="Refresh">
              <i class="bi bi-arrow-clockwise"></i>
            </button>

            <a id="download-all-zip" class="btn-ghost" href="/gallery-dl/files/archive" title="Download everything as ZIP">
              <i class="bi bi-file-earmark-zip"></i>
              <span>ZIP</span>
            </a>

            <button id="toggle-logs" class="btn-ghost" type="button" title="Toggle log panel">
              <i class="bi bi-terminal"></i>
              <span>Logs</span>
            </button>
          </div>
        </div>

        <nav id="downloads-breadcrumbs" class="breadcrumbs" aria-label="Path"></nav>

        <div id="downloads-view" class="downloads-view grid-view"></div>
      </section>

      <section id="container-logs" class="logs-panel hidden">
        <div class="logs-header">
          <span><i class="bi bi-terminal"></i> Log stream</span>
          <button id="close-logs" class="icon-btn" type="button" aria-label="Close logs">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <textarea id="box" name="Logs" placeholder="Logs output" readonly></textarea>
      </section>
    </main>

    <footer class="app-footer">
      <span>
        <a href="https://github.com/mikf/gallery-dl" target="_blank" rel="noopener noreferrer">gallery-dl</a>
        v{{ gallery_dl_version }}
        ·
        <a href="https://github.com/yt-dlp/yt-dlp" target="_blank" rel="noopener noreferrer">yt-dlp</a>
        v{{ yt_dlp_version }}
      </span>
    </footer>

    <div id="viewer" class="viewer hidden" role="dialog" aria-modal="true" aria-label="Media viewer">
      <div class="viewer-topbar">
        <div id="viewer-title" class="viewer-title"></div>
        <div class="viewer-tools">
          <a id="viewer-download" class="icon-btn" href="#" title="Download" aria-label="Download">
            <i class="bi bi-download"></i>
          </a>
          <a id="viewer-open" class="icon-btn" href="#" target="_blank" rel="noopener noreferrer" title="Open in new tab" aria-label="Open in new tab">
            <i class="bi bi-box-arrow-up-right"></i>
          </a>
          <button id="viewer-close" class="icon-btn" type="button" title="Close" aria-label="Close">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>

      <button id="viewer-prev" class="viewer-nav prev" type="button" aria-label="Previous">
        <i class="bi bi-chevron-left"></i>
      </button>
      <button id="viewer-next" class="viewer-nav next" type="button" aria-label="Next">
        <i class="bi bi-chevron-right"></i>
      </button>

      <div id="viewer-stage" class="viewer-stage"></div>

      <div id="viewer-meta" class="viewer-meta"></div>
    </div>

    <script src="/static/scripts/index.js?v=0.3.0"></script>
  </body>
</html>
