<!DOCTYPE html>
<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Logs - gallery-dl-server</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kristi&display=swap"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="/static/styles/common.css?v=0.3.0" />
    <link rel="stylesheet" href="/static/styles/logs.css?v=0.3.0" />

    <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon" />
    <link rel="manifest" href="/static/icons/site.webmanifest" />
  </head>

  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <a class="brand" href="/gallery-dl">
          <span class="brand-mark">dl</span>
          <span class="brand-name">gallery-dl-server</span>
        </a>

        <nav class="app-nav">
          <a class="nav-link" href="/gallery-dl">Files</a>
          <a class="nav-link active" href="/gallery-dl/logs">Logs</a>
        </nav>

        <div class="app-header-right">
          <a
            class="version-link"
            href="https://github.com/jthickma/gallery-dl-server"
            target="_blank"
            rel="noopener noreferrer"
            >v{{ app_version }}</a
          >
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="logs-page">
        <div class="logs-toolbar">
          <h1>Logs</h1>
          <div class="logs-toolbar-actions">
            <button id="refresh-logs" class="icon-btn" type="button">
              <i class="bi bi-arrow-clockwise"></i><span>Refresh</span>
            </button>
            <button id="clear-logs" class="icon-btn" type="button">
              <i class="bi bi-trash"></i><span>Clear</span>
            </button>
            <a class="icon-btn" href="/stream/logs" target="_blank" rel="noopener noreferrer">
              <i class="bi bi-file-text"></i><span>Plain</span>
            </a>
            <a class="icon-btn" href="/stream/logs" download="gallery-dl-server.log">
              <i class="bi bi-download"></i><span>Download</span>
            </a>
          </div>
        </div>

        <pre id="container-logs">{{ logs }}</pre>
      </div>
    </main>

    <script src="/static/scripts/logs.js?v=0.3.0"></script>
  </body>
</html>
